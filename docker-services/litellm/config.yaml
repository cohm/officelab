model_list:
  # Local Spark (Ollama native API) — agent-facing, thinking OFF
  - model_name: qwen3.6
    litellm_params:
      model: ollama_chat/qwen3.6:35b
      api_base: http://100.112.104.107:11434
      think: false
  # Same model, thinking ON — for deliberation
  - model_name: qwen3.6-think
    litellm_params:
      model: ollama_chat/qwen3.6:35b
      api_base: http://100.112.104.107:11434
      think: true
  # OpenRouter — wildcard passthrough: call any model as openrouter/<slug>
  - model_name: openrouter/*
    litellm_params:
      model: openrouter/*
      api_key: os.environ/OPENROUTER_API_KEY
litellm_settings:
  drop_params: true
  turn_off_message_logging: true     # keep token/cost accounting; never persist prompt/response text
